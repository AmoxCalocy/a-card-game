name: CI - Unity Build

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows (Standalone)
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_VERSION: 2022.3.62f2
      BUILD_NAME: roguelike-win
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ hashFiles('**/Packages/packages-lock.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-

      - name: Ensure logs folder
        run: mkdir -p Logs

      - name: Verify Unity license secret
        run: |
          if [ -z "${UNITY_LICENSE}" ]; then
            echo "UNITY_LICENSE secret is missing; set it in repo settings to run Unity Builder." >&2
            exit 1
          fi
          echo "UNITY_LICENSE length: ${#UNITY_LICENSE}"

      - name: Build (StandaloneWindows64)
        uses: game-ci/unity-builder@v4
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneWindows64
          buildsPath: build
          buildName: ${{ env.BUILD_NAME }}
          allowDirtyBuild: true
          providerStrategy: unity-licensing-file
          customParameters: -batchmode -nographics -logFile Logs/ci-build.log

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: build/${{ env.BUILD_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-logs
          path: |
            Logs/**
            build/${{ env.BUILD_NAME }}/**/*.log
            /github/home/.config/unity3d/Unity/Editor/*.log
            /github/home/.local/share/unity3d/Unity/Editor/*.log
          if-no-files-found: ignore
          retention-days: 14
